name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-build.txt

      - name: Build executable
        shell: pwsh
        run: .\build_exe.ps1

      - name: Create release zip
        shell: pwsh
        run: Compress-Archive -Path dist\AutoGenerateDaltonArticles.exe -DestinationPath dist\AutoGenerateDaltonArticles-windows.zip -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoGenerateDaltonArticles-windows
          path: dist/AutoGenerateDaltonArticles-windows.zip

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          if (gh release view $tag 2>$null) {
            gh release upload $tag dist\AutoGenerateDaltonArticles-windows.zip --clobber
          } else {
            gh release create $tag dist\AutoGenerateDaltonArticles-windows.zip --generate-notes
          }
